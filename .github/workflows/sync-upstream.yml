name: Sync with Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # Do not run on the main repository family (feeease or school-management)
    # if: github.repository != 'lfgraphics/feeease' && github.repository != 'lfgraphics/school-management'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main # Ensure we are on the main branch

      - name: Configure Git
        run: |
          git config user.name "FeeEase Syncer"
          git config user.email "sync@feeease.com"

      - name: Add Upstream
        run: |
          # Ensure upstream is set to the correct original source
          git remote add upstream https://github.com/lfgraphics/school-management.git || true
          git fetch upstream main

      - name: Sync Safely
        id: sync
        run: |
          # Switch to main explicitly
          git checkout main

          if git merge --ff-only upstream/main; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "Fast-forward successful"

          elif git merge upstream/main --no-edit; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "Merge successful"

          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "Conflict detected"

            git status > conflict-log.txt
            git diff > conflict-diff.txt

            git merge --abort
          fi

      - name: Push Changes
        if: steps.sync.outputs.status == 'success'
        run: git push origin main

      - name: Create Issue on Conflict
        if: steps.sync.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ Upstream Sync Conflict Detected";

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            const alreadyExists = issues.find(issue => issue.title === title);

            if (!alreadyExists) {
              const fs = require('fs');

              let status = fs.readFileSync('conflict-log.txt', 'utf8');
              let diff = fs.readFileSync('conflict-diff.txt', 'utf8');

              const body = `
              A merge conflict occurred while syncing with upstream.

              ### Details:
              \`\`\`
              ${status}
              \`\`\`

              ### Diff:
              \`\`\`
              ${diff.substring(0, 5000)}
              \`\`\`

              ### Action Required:
              Manually resolve conflicts and push changes.
              `;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
